project:
  type: book
  output-dir: docs

profile:
  default: book
  group:
    - [book, slides]

book:
  title: "Inverse Problems in Geophysics"
  author: "Thomas Günther (TU Bergakademie Freiberg)"
  chapters:
    - index.qmd
    - 01_introduction.qmd
    - 02_linear_problems.qmd
    - literature.qmd
bibliography: inv.bib
csl: harvard.csl
format:
  html:
    theme: cosmo
    number-sections: true
    lib-dir: site_libs
    code-fold: true
    code-summary: "Show the code"
    include-in-header:
      - text: |
          <script>
          window.MathJax = {
            loader: {
              load: ['[tex]/physics']
            },
            tex: {
              packages: {'[+]': ['physics']}
            }
          };
          </script>

editor: source